# ╔═══════════════════════════════════════╗
# ║           Aztree Configuration        ║
# ║        Smart TreeCapitator Plugin     ║
# ╚═══════════════════════════════════════╝

prefix: "&e&lWC &d>> "

aztree:
  enabled: true
  require-sneak: true
  max-blocks: 100
  radius: 6
  max-distance: 6
  blocks-per-tick: 10
  cooldown: 2
  smart-detection: true

blacklisted-worlds:
  - world_nether
  - world_the_end

replant:
  enabled: true
  chance: 100

reminder:
  enabled: true
  interval: 5
  type: actionbar
  message: "&aWc AKTIF! &7(Jongkok untuk digunakan)"

effects:
  sound: true
  particle: true

messages:
  enable: "%prefix%&aAztree diaktifkan!"
  disable: "%prefix%&cAztree dimatikan!"
  need-sneak: "%prefix%&eKamu harus jongkok!"
  cooldown: "%prefix%&cTunggu &e%time% detik&c!"
  not-tree: "%prefix%&cIni bukan pohon!"
  blacklisted-world: "%prefix%&cAztree tidak bisa digunakan di world ini!"
